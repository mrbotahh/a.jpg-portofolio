<!DOCTYPE html>
<html lang="en" class="bg-black text-white scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <style>
        #loader { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="bg-black">
    <div id="loader" class="fixed inset-0 z-[100] bg-black flex items-center justify-center">
        <div class="text-neonYellow">LOADING...</div>
    </div>

    <div id="topo-bg" class="fixed inset-0 z-0 opacity-30"></div>

    <main class="relative z-10 p-10">
        <h1 class="text-6xl font-bold">THE MIND BEHIND THE SYSTEM.</h1>
        <p class="mt-4 text-gray-400">Content placeholder...</p>
    </main>

    <script>
        // FAIL-SAFE: Hide loader after 3 seconds no matter what
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 3000);
        });

        // TOPO BACKGROUND
        new p5((p) => {
            p.setup = () => {
                let canvas = p.createCanvas(p.windowWidth, p.windowHeight);
                canvas.parent('topo-bg');
            };
            p.draw = () => {
                p.clear();
                p.stroke('#CCFF00');
                p.noFill();
                for (let y = 0; y < p.height; y += 50) {
                    p.beginShape();
                    for (let x = 0; x < p.width; x += 20) {
                        p.vertex(x, y + p.sin(x * 0.01 + p.frameCount * 0.05) * 20);
                    }
                    p.endShape();
                }
            };
        });
    </script>
</body>
</html>
