<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <title>Portfolio | Ultimate Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        /* Force heights so Swiper renders */
        .swiper { width: 100%; height: 500px; }
        .swiper-slide img, .swiper-slide video { width: 100%; height: 100%; object-fit: cover; }
        #topo-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        /* Fix Header Alignment */
        .header-fix { display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body class="bg-black">
    <canvas id="topo-canvas"></canvas>

    <header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10 h-20">
        <nav class="max-w-7xl mx-auto px-6 h-full header-fix">
            <a href="#" class="flex items-center gap-4 font-bold text-xl tracking-tighter">
                <img src="assets/logo.png" class="h-8 w-auto"> PORTFOLIO
            </a>
        </nav>
    </header>

    <main class="pt-32 pb-20 space-y-24">
        <section class="max-w-5xl mx-auto px-6">
            <h2 class="text-3xl font-black mb-8">Photography</h2>
            <div class="swiper photo-swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="assets/photography/photo1.jpg"></div>
                    <div class="swiper-slide"><img src="assets/photography/photo2.jpg"></div>
                </div>
            </div>
        </section>

        <section class="max-w-5xl mx-auto px-6">
            <h2 class="text-3xl font-black mb-8">Post-Production</h2>
            <div class="swiper manual-swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="assets/editing/before1.jpg"></div>
                    <div class="swiper-slide"><img src="assets/editing/after1.jpg"></div>
                </div>
                <div class="swiper-button-next"></div><div class="swiper-button-prev"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Init Swiper
        new Swiper('.photo-swiper', { autoplay: { delay: 2000 }, loop: true });
        new Swiper('.manual-swiper', { loop: false, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' } });

        // Topography
        const canvas = document.getElementById('topo-canvas');
        const ctx = canvas.getContext('2d');
        function animate() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.strokeStyle = '#CCFF00';
            ctx.beginPath();
            for(let i=0; i<canvas.width; i+=20) {
                ctx.lineTo(i, (canvas.height/2) + Math.sin(i*0.01 + Date.now()*0.002)*50);
            }
            ctx.stroke();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
