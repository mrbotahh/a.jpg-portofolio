<!DOCTYPE html>
<html lang="en" class="bg-black text-white scroll-smooth selection:bg-neonYellow selection:text-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Creative Identity & Craft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .font-ndot { font-family: 'VT323', monospace; letter-spacing: 0.1em; }
        .custom-cursor { width: 20px; height: 20px; border: 2px solid #CCFF00; border-radius: 50%; position: fixed; transform: translate(-50%, -50%); pointer-events: none; z-index: 9999; transition: width 0.2s, height 0.2s, background-color 0.2s; }
        .custom-cursor-grow { width: 50px; height: 50px; background-color: rgba(204, 255, 0, 0.15); }
    </style>
</head>
<body class="bg-black text-gray-100 overflow-x-hidden">

    <canvas id="topo-canvas" class="fixed top-0 left-0 w-full h-full z-[-1] opacity-20 pointer-events-none"></canvas>
    <div class="custom-cursor" id="js-cursor"></div>

    <main id="work" class="py-24 space-y-32">
        <section class="max-w-7xl mx-auto px-6">
            <h2 class="text-3xl font-black mb-12">Photography Showcase</h2>
            <div id="photo-carousel" class="flex gap-6 overflow-x-auto snap-x snap-mandatory pb-8 scrollbar-hide">
                <div class="min-w-[80%] md:min-w-[30%] snap-center border border-white/5 bg-neutral-900 aspect-[1080/1427] flex-shrink-0">
                    <img src="assets/photography/photo1.jpg" class="w-full h-full object-cover">
                </div>
                </div>
        </section>

        <section class="max-w-4xl mx-auto px-6">
            <div class="before-after-container relative aspect-[1080/609] overflow-hidden border border-white/5 cursor-ew-resize">
                <img src="assets/editing/project1-before.jpg" class="absolute inset-0 w-full h-full object-cover">
                <div class="after-wrapper absolute inset-0 w-1/2 overflow-hidden border-r-2 border-neonYellow">
                    <img src="assets/editing/project1-after.jpg" class="absolute inset-0 w-full h-full object-cover min-w-[1080px]">
                </div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-black border border-neonYellow flex items-center justify-center text-neonYellow text-xs">
                    &lt;&gt;
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. Background Engine
        const canvas = document.getElementById('topo-canvas');
        const ctx = canvas.getContext('2d');
        let time = 0;
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(204, 255, 0, 0.4)';
            for (let i = 0; i < 18; i++) {
                ctx.beginPath();
                for (let x = 0; x <= canvas.width; x += 30) {
                    const y = (canvas.height/2) + Math.sin(x*0.003 + time + i*0.15)*100 + (i*25);
                    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            time += 0.004; requestAnimationFrame(draw);
        }
        draw();

        // 2. Carousel Auto-scroll
        const carousel = document.getElementById('photo-carousel');
        setInterval(() => {
            if (carousel.scrollLeft + carousel.clientWidth >= carousel.scrollWidth) carousel.scrollTo({left: 0, behavior: 'smooth'});
            else carousel.scrollBy({left: 300, behavior: 'smooth'});
        }, 3000);

        // 3. Before/After Slider
        document.querySelector('.before-after-container').addEventListener('mousemove', (e) => {
            const container = e.currentTarget;
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            container.querySelector('.after-wrapper').style.width = `${(x / rect.width) * 100}%`;
        });
    </script>
</body>
</html>
