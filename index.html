<!-- POST-PRODUCTION LAB (Updated for 4 Before/After Pairs) -->
<!-- Note: The slider script currently only supports one interactive element. 
     You can stack these below to show your 4 results. -->
<div class="max-w-4xl mx-auto space-y-12">
    <div id="before-after-slider" class="relative w-full aspect-video overflow-hidden border border-white/5 cursor-ew-resize">
        <img src="assets/editing/before1.jpg" class="absolute inset-0 w-full h-full object-cover">
        <div id="after-image-wrapper" class="absolute inset-0 w-1/2 overflow-hidden border-r border-neonYellow">
            <img src="assets/editing/after1.jpg" id="after-img-el" class="absolute inset-0 w-full h-full object-cover max-w-none">
        </div>
    </div>
</div>
