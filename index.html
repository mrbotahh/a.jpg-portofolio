<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ammmar.jpg | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');
        body { font-family: 'Courier Prime', monospace; cursor: crosshair; }
        .dot-matrix { letter-spacing: 0.1em; text-transform: uppercase; }
        section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 2rem; position: relative; z-index: 10; }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        .gaussian-loader { backdrop-filter: blur(20px); }
        .slider-container { position: relative; width: 100%; height: 400px; overflow: hidden; border: 1px solid #facc15; }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-black gaussian-loader">
        <div class="flex space-x-4">
            <div class="w-4 h-4 bg-yellow-400 rounded-full animate-pulse"></div>
            <div class="w-4 h-4 bg-yellow-400 rounded-full animate-pulse delay-75"></div>
            <div class="w-4 h-4 bg-yellow-400 rounded-full animate-pulse delay-150"></div>
        </div>
    </div>

    <div class="fixed top-0 right-0 w-full h-2 z-40 bg-gray-900">
        <div id="progress-bar" class="h-full bg-yellow-400" style="width: 0%;"></div>
    </div>

    <nav class="fixed top-0 left-0 w-full p-6 flex justify-between z-30 dot-matrix text-sm">
        <div>AMMMAR.JPG</div>
        <div class="flex gap-6">
            <a href="#portfolio" class="hover:text-yellow-400 transition">WORK</a>
            <a href="#about" class="hover:text-yellow-400 transition">ABOUT</a>
            <a href="#contact" class="hover:text-yellow-400 transition">CONTACT</a>
        </div>
    </nav>

    <canvas id="bg-canvas"></canvas>

    <main class="relative z-10">
        <section id="hero">
            <h1 class="text-6xl md:text-9xl font-bold dot-matrix">CREATIVE<br>DIRECTION</h1>
        </section>

        <section id="portfolio" class="py-20">
            <h2 class="text-4xl mb-10 dot-matrix">SELECTED WORK</h2>
            
            <!-- Automatic Image Carousel -->
            <div id="image-carousel" class="flex gap-4 w-[200%] mb-20">
                <img src="photo1.jpg" class="w-1/4 h-64 object-cover" alt="Work">
                <img src="photo2.jpg" class="w-1/4 h-64 object-cover" alt="Work">
                <img src="photo3.jpg" class="w-1/4 h-64 object-cover" alt="Work">
                <img src="photo4.jpg" class="w-1/4 h-64 object-cover" alt="Work">
            </div>

            <!-- Before/After Slider -->
            <h3 class="text-2xl mb-6 dot-matrix">EDITING PRECISION</h3>
            <div id="slider-box" class="slider-container group">
                <img src="after.jpg" class="absolute inset-0 w-full h-full object-cover">
                <div id="slider-handle" class="absolute inset-0 w-1/2 overflow-hidden border-r-2 border-yellow-400">
                    <img src="before.jpg" class="absolute inset-0 w-[200%] h-full object-cover">
                </div>
            </div>
        </section>

        <section id="about">
            <h2 class="text-4xl mb-10 dot-matrix">ABOUT ME</h2>
            <p id="about-text" class="text-2xl md:text-4xl max-w-4xl"></p>
        </section>

        <section id="contact">
            <h2 class="text-4xl mb-10 dot-matrix">FIND ME AT</h2>
            <div class="flex gap-8 mb-20">
                <a href="https://www.tiktok.com/@ammmar.jpg?_r=1&_t=ZS-97UJaymfx5u" target="_blank" class="hover:text-yellow-400">TIKTOK</a>
                <a href="https://www.instagram.com/ammmar.jpg?igsh=a2pnNXRhbm5pZzgy" target="_blank" class="hover:text-yellow-400">INSTAGRAM</a>
            </div>

            <h2 class="text-4xl mb-10 dot-matrix">CONTACT ME AT</h2>
            <form action="https://api.web3forms.com/submit" method="POST" class="max-w-md">
                <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
                <input type="email" name="email" value="anmmar.jpg@gmail.com" readonly class="bg-transparent border-b border-yellow-400 w-full py-2 mb-6 outline-none">
                <textarea name="message" placeholder="YOUR MESSAGE" class="w-full bg-black border border-yellow-400 p-4 mb-6"></textarea>
                <button type="submit" class="bg-yellow-400 text-black px-8 py-2 dot-matrix font-bold">SEND</button>
            </form>
        </section>
    </main>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.min.js';

        // 3D Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const plane = new THREE.Mesh(new THREE.PlaneGeometry(20, 20, 50, 50), new THREE.MeshBasicMaterial({ color: 0xFDFF00, wireframe: true, transparent: true, opacity: 0.3 }));
        plane.rotation.x = -Math.PI / 3;
        scene.add(plane);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            plane.rotation.z += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        // GSAP & Interactivity
        gsap.registerPlugin(ScrollTrigger);
        
        // Progress Bar
        ScrollTrigger.create({
            trigger: "body",
            start: "top top",
            end: "bottom bottom",
            onUpdate: (self) => document.getElementById('progress-bar').style.width = (self.progress * 100) + "%"
        });

        // Carousel Animation
        gsap.to("#image-carousel", { x: "-50%", duration: 20, repeat: -1, ease: "linear" });

        // Slider Logic
        const sliderBox = document.getElementById('slider-box');
        const handle = document.getElementById('slider-handle');
        sliderBox.addEventListener('mousemove', (e) => {
            const rect = sliderBox.getBoundingClientRect();
            handle.style.width = (e.clientX - rect.left) + 'px';
        });

        // Typewriter
        const text = "Visual Architect. Videographer. Editor. Turning chaos into structured, pixel-perfect reality.";
        const el = document.getElementById('about-text');
        ScrollTrigger.create({
            trigger: "#about",
            start: "top 80%",
            onEnter: () => {
                let i = 0;
                function type() { if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 30); } }
                type();
            }
        });

        window.addEventListener('load', () => document.getElementById('loader').style.display = 'none');
    </script>
</body>
</html>
