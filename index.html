<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <title>Portfolio | Ultimate Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        /* Essential Styles */
        body { margin: 0; overflow-x: hidden; }
        #loader { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; align-items: center; justify-content: center; font-family: sans-serif; transition: opacity 0.5s; }
        #topo-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        .swiper { width: 100%; max-width: 900px; height: 500px; border-radius: 1rem; overflow: hidden; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-black">

    <div id="loader"><h1 class="text-neonYellow text-4xl font-bold">LOADING...</h1></div>

    <canvas id="topo-canvas"></canvas>

    <header class="fixed top-0 w-full z-40 bg-black/50 backdrop-blur-md border-b border-white/10 h-20 flex items-center px-6">
        <a href="#" class="flex items-center gap-4 text-xl font-bold tracking-tighter">
            <img src="assets/logo.png" class="h-8 w-auto"> PORTFOLIO
        </a>
    </header>

    <main class="pt-32 pb-20 space-y-24">
        <section>
            <h2 class="text-center text-3xl font-black mb-8">Photography</h2>
            <div class="swiper photo-swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="assets/photography/photo1.jpg"></div>
                    <div class="swiper-slide"><img src="assets/photography/photo2.jpg"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Loading Screen Logic
        window.addEventListener('load', () => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        });

        // Sliders
        new Swiper('.photo-swiper', { autoplay: { delay: 2000 }, loop: true });

        // Topography
        const canvas = document.getElementById('topo-canvas');
        const ctx = canvas.getContext('2d');
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.strokeStyle = '#CCFF00';
            ctx.beginPath();
            for(let i=0; i<canvas.width; i+=30) {
                ctx.lineTo(i, (canvas.height/2) + Math.sin(i*0.01 + Date.now()*0.002)*100);
            }
            ctx.stroke();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
