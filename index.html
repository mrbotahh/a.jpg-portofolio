<!DOCTYPE html>
<html lang="en" class="bg-black text-white scroll-smooth">
<head>
    <meta charset="UTF-8">
    <title>Portfolio | Ultimate Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        .font-ndot { font-family: 'DotGothic16', sans-serif; letter-spacing: 0.1em; }
        #loader { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .swiper { width: 100%; max-width: 900px; height: 500px; border-radius: 1rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .swiper-slide img, .swiper-slide video { width: 100%; height: 100%; object-fit: cover; }
        .swiper-button-next, .swiper-button-prev { color: #CCFF00 !important; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
    </style>
</head>
<body class="bg-black">
    <div id="loader"><h1 class="text-neonYellow text-4xl font-ndot">LOADING...</h1></div>
    
    <canvas id="topo-canvas"></canvas>

    <header class="fixed top-0 w-full z-40 bg-black/60 backdrop-blur-md border-b border-white/10 h-20">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-4 font-ndot font-bold text-xl tracking-widest">
                <img src="assets/logo.png" class="h-8 w-auto"> PORTFOLIO
            </a>
            <div class="flex items-center space-x-8 text-sm font-medium font-ndot">
                <a href="index.html" class="text-[#CCFF00]">HOME</a>
                <a href="about.html" class="text-gray-400">ABOUT</a>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20 space-y-32">
        <section class="px-6">
            <h2 class="text-center text-3xl font-black uppercase mb-12">Photography</h2>
            <div class="swiper photo-swiper mx-auto"><div class="swiper-wrapper">
                <div class="swiper-slide"><img src="assets/photography/photo1.jpg"></div>
                <div class="swiper-slide"><img src="assets/photography/photo2.jpg"></div>
            </div></div>
        </section>

        <section class="px-6">
            <h2 class="text-center text-3xl font-black uppercase mb-12">Post-Production</h2>
            <div class="swiper manual-swiper mx-auto"><div class="swiper-wrapper">
                <div class="swiper-slide"><img src="assets/editing/before1.jpg"></div>
                <div class="swiper-slide"><img src="assets/editing/after1.jpg"></div>
            </div><div class="swiper-button-next"></div><div class="swiper-button-prev"></div></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Ensure everything loads before running
        window.addEventListener('load', () => {
            document.getElementById('loader').style.display = 'none';
            new Swiper('.photo-swiper', { autoplay: { delay: 3000 }, loop: true });
            new Swiper('.manual-swiper', { navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' } });
        });

        // Topo Canvas
        const canvas = document.getElementById('topo-canvas');
        const ctx = canvas.getContext('2d');
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.strokeStyle = '#CCFF00';
            ctx.beginPath();
            for(let i=0; i<canvas.width; i+=40) {
                ctx.lineTo(i, (canvas.height/2) + Math.sin(i*0.01 + Date.now()*0.002)*80);
            }
            ctx.stroke();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
