<!DOCTYPE html>

    <script>

    <style>
        ::-webkit-scrollbar { display: none; }

        #topo-bg { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }

        .custom-cursor {
            width: 20px; height: 20px; border: 2px solid #CCFF00; border-radius: 50%;
            position: fixed; transform: translate(-50%, -50%); pointer-events: none; z-index: 9999;
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        .custom-cursor-grow { width: 50px; height: 50px; background-color: rgba(204, 255, 0, 0.15); border-color: #CCFF00; }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 40px;
            height: 40px;
            cursor: ew-resize;
        }
    </style>
</head>
<body class="bg-oled text-gray-100 overflow-x-hidden antialiased">
    <div id="topo-bg"></div>

    <!-- Gaussian Blur Loading Screen -->
    <div id="loader" class="fixed inset-0 z-[100] bg-black flex items-center justify-center transition-opacity duration-700">
        <div class="flex space-x-3">
            <div class="w-4 h-4 bg-neonYellow rounded-full animate-[pulse_1.5s_ease-in-out_infinite]"></div>
            <div class="w-4 h-4 bg-neonYellow rounded-full animate-[pulse_1.5s_ease-in-out_0.2s_infinite]"></div>
            <div class="w-4 h-4 bg-neonYellow rounded-full animate-[pulse_1.5s_ease-in-out_0.4s_infinite]"></div>
        </div>
    </div>

    <div class="custom-cursor" id="js-cursor"></div>

    <header class="fixed top-0 left-0 w-full z-50 bg-oled/80 backdrop-blur-md border-b border-white/5 transition-all duration-300">
        <nav class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

                <img src="assets/logo.png" alt="Logo" class="h-8 object-contain" onerror="this.style.display='none'">

            <div class="flex items-center space-x-8 text-sm font-medium tracking-wider uppercase font-ndot relative z-50">
                <a href="index.html" class="hover-target text-gray-400 hover:text-white transition-colors">Home</a>
                <a href="about.html" class="hover-target text-neonYellow transition-colors">About</a>
            </div>
        </nav>

    <main class="relative z-10 pt-32 pb-10 space-y-32">
        <!-- Content sections remain unchanged -->
        <section class="px-6 max-w-7xl mx-auto">
            <div class="max-w-4xl">
                <span class="font-ndot text-neonYellow text-sm uppercase tracking-widest block mb-3">BIOGRAPHY // PROFILE</span>
                <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tight leading-none mb-6">
                    THE MIND BEHIND<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-neutral-200 to-neutral-500">THE SYSTEM.</span>
                </h1>
            </div>
        </section>
        <!-- (Rest of your sections omitted here for brevity, keep the ones from your original code) -->
    </main>

    <!-- UPDATED TOPOGRAPHIC BACKGROUND ENGINE -->
    <script>
        new p5((p) => {
            p.setup = () => {
                let canvas = p.createCanvas(p.windowWidth, p.windowHeight);
                canvas.parent('topo-bg');
            };
            p.draw = () => {
                p.clear();
                p.stroke('#CCFF00'); // Neon Yellow as requested
                p.strokeWeight(1);
                p.noFill();
                
                // Topographic contour line logic
                for (let y = 50; y < p.height; y += 60) {
                    p.beginShape();
                    for (let x = 0; x <= p.width; x += 20) {
                        // Creating smooth wave-like contour lines
                        let angle = (x * 0.005) + (p.frameCount * 0.01);
                        let wave = p.sin(angle) * 20;
                        
                        // Adding mouse influence to displace lines
                        let d = p.dist(p.mouseX, p.mouseY, x, y);
                        let displacement = p.map(d, 0, 400, 40, 0, true);
                        
                        p.vertex(x, y + wave + displacement);
                    }
                    p.endShape();
                }
            };
            p.windowResized = () => p.resizeCanvas(p.windowWidth, p.windowHeight);
        });
    </script>

    <script>
        // Existing loader and cursor scripts...
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            if(loader) {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        loader.style.pointerEvents = 'none'; 
                    }, 700); 
                }, 1200); 
            }
        });
        const cursor = document.getElementById('js-cursor');
        if (cursor) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = `${e.clientX}px`;
                cursor.style.top = `${e.clientY}px`;
            });
            document.querySelectorAll('.hover-target, input[type="range"], a, button').forEach(item => {
                item.addEventListener('mouseenter', () => cursor.classList.add('custom-cursor-grow'));
                item.addEventListener('mouseleave', () => cursor.classList.remove('custom-cursor-grow'));
            });
        }
        function updateSlider(val, imgId, lineId) {
            document.getElementById(imgId).style.clipPath = `inset(0 ${100 - val}% 0 0)`;
            document.getElementById(lineId).style.left = `${val}%`;
        }
    </script>
</body>
