<!DOCTYPE html>
<html lang="en" class="bg-black text-white scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        .font-ndot { font-family: 'VT323', monospace; letter-spacing: 0.1em; }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-black text-white antialiased">

    <canvas id="topo-canvas"></canvas>

    <header class="relative z-20 max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
        <div class="text-white font-bold tracking-widest text-lg">PORTFOLIO</div>
        <div class="mr-12">
            <img src="assets/logo.png" alt="Logo" class="w-24 h-24 object-contain">
        </div>
    </header>

    <main class="relative z-20 max-w-7xl mx-auto px-6 py-20 space-y-32">
        <h1 class="text-6xl md:text-8xl font-black uppercase">THE MIND BEHIND<br>THE SYSTEM.</h1>

        <section id="contact" class="pt-20 border-t border-white/20">
            <div class="flex flex-col md:flex-row gap-8 text-xl font-ndot uppercase tracking-widest">
                <a href="mailto:your@email.com" class="hover:text-yellow-400 transition-colors">Gmail</a>
                <a href="https://instagram.com/yourhandle" target="_blank" class="hover:text-yellow-400 transition-colors">Instagram</a>
                <a href="https://tiktok.com/@yourhandle" target="_blank" class="hover:text-yellow-400 transition-colors">TikTok</a>
            </div>
        </section>
    </main>

    <script>
        // Topographic Background Engine
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('topo-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.PlaneGeometry(20, 20, 30, 30);
        const material = new THREE.MeshBasicMaterial({ color: 0x333333, wireframe: true });
        const plane = new THREE.Mesh(geometry, material);
        plane.rotation.x = -Math.PI / 3;
        scene.add(plane);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            plane.rotation.z += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
